<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/OCB.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta
			name="description"
			content="Create, preview, and export your generative NFT collection. Layer art, tune rarity, set incompatibility rules, and download IPFS-ready images and metadata."
		/>
		<title>NFT Collection Generator</title>
		<link rel="canonical" href="https://generator.abashoverse.com/" />
		<meta name="theme-color" content="#d4ded1" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />

		<!-- Open Graph / link previews -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="NFT Collection Generator" />
		<meta property="og:title" content="NFT Collection Generator" />
		<meta
			property="og:description"
			content="Create, preview, and export your generative NFT collection. Layer art, tune rarity, set incompatibility rules, and download IPFS-ready images and metadata."
		/>
		<meta property="og:url" content="https://generator.abashoverse.com/" />
		<meta property="og:image" content="https://generator.abashoverse.com/og-image.png" />
		<meta property="og:image:type" content="image/png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:image:alt" content="NFT Collection Generator, a generative NFT toolkit" />

		<!-- Twitter / X card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="NFT Collection Generator" />
		<meta
			name="twitter:description"
			content="Create, preview, and export your generative NFT collection. Layer art, tune rarity, set rules, and download IPFS-ready images and metadata."
		/>
		<meta name="twitter:image" content="https://generator.abashoverse.com/og-image.png" />
		<meta name="twitter:image:alt" content="NFT Collection Generator, a generative NFT toolkit" />
		<link rel="preconnect" href="https://api.fontshare.com" crossorigin />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="stylesheet"
			href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap"
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap"
			rel="stylesheet"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
