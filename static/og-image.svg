<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
	<!--
		Card layout only. The OCB mark is recoloured to sage and composited onto
		the right side at build time. To regenerate static/og-image.png:
		  sed 's/#292929/#d4ded1/g' static/OCB.svg > /tmp/ocb-sage.svg
		  rsvg-convert -w 300 -h 300 /tmp/ocb-sage.svg -o /tmp/ocb-sage.png
		  rsvg-convert -w 1200 -h 630 static/og-image.svg -o /tmp/og-base.png
		  convert /tmp/og-base.png /tmp/ocb-sage.png -geometry +812+165 -composite static/og-image.png
	-->
	<rect width="1200" height="630" fill="#0a0a0a" />
	<rect x="40" y="40" width="1120" height="550" rx="22" fill="#141414" stroke="#4a5a4a" stroke-width="2" />

	<text x="74" y="162" font-family="'JetBrains Mono', 'Noto Sans Mono', monospace" font-size="24" letter-spacing="5" fill="#8a9a8a">// GENERATIVE NFT TOOLKIT</text>

	<text x="70" y="296" font-family="Satoshi, 'DejaVu Sans', sans-serif" font-weight="700" font-size="86" fill="#d4ded1">NFT Collection</text>
	<text x="70" y="392" font-family="Satoshi, 'DejaVu Sans', sans-serif" font-weight="700" font-size="86" fill="#d4ded1">Generator</text>

	<text x="74" y="452" font-family="Satoshi, 'DejaVu Sans', sans-serif" font-size="28" fill="#8a9a8a">Layer art, tune rarity, set rules, export to file.</text>

	<rect x="72" y="494" width="468" height="52" rx="26" fill="#d4ded1" />
	<text x="100" y="528" font-family="'JetBrains Mono', 'Noto Sans Mono', monospace" font-size="25" fill="#0a0a0a">generator.abashoverse.com</text>
</svg>
